<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AetherBand | Wear Your Digital Identity</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!--NAVBAR-->
    <header class="navbar">
      <div class="container nav-container">
        <!-- Logo -->
        <a href="#" class="logo">
          <img src="assets/images/logo.png" alt="AetherBand Logo" />
        </a>

        <!-- Desktop Menu -->
        <nav class="navigation">
          <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#testimonials">Testimonials</a></li>
            <li><a href="#contact">Contact</a></li>
          </ul>
        </nav>

        <!-- Mobile Icon -->
        <div class="menu-toggle">☰</div>
      </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero" id="home">
      <div class="container hero-container">
        <!-- Left Content -->
        <div class="hero-content">
          <span class="hero-badge"> The Future of Digital Identity </span>

          <h1>
            Wear Your
            <span>Digital Identity</span>
          </h1>

          <p>
            Replace wallets, keys, access cards and IDs with one secure wearable
            device.
          </p>

          <a href="#" class="hero-btn"> Get Early Access </a>

          <div class="hero-features">
            <div class="feature">
              <h4>🔒 Secure</h4>
              <p>Bank-level security</p>
            </div>

            <div class="feature">
              <h4>⚡ Fast</h4>
              <p>Instant access</p>
            </div>

            <div class="feature">
              <h4>✔ Seamless</h4>
              <p>Works everywhere</p>
            </div>
          </div>
        </div>

        <!-- Right Image -->
        <div class="hero-image">
          <img src="assets/images/band.png" alt="AetherBand Smart Band" />
        </div>
      </div>
    </section>
  </body>
</html>
